<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Hospedando Videos</title>
</head>
<body>
    <h1>Hospedando Vídeos Localmente</h1>
    <p>Este vídeo está hospedado no meu proprio servidor</p>
    <video controls width="560px" poster="imagens/crybaby.jpg">
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/meu-videomkv.mkv" type="video/mkv">
        <source src="midia/meu-videowebm.webm" type="video/webm">
    </video>
    <h1>Inserindo Videos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/n3Xv_g3g-mA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
