<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Fontes com o Google Fontes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courgette&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Comforter&family=Courgette&family=Work+Sans:ital,wght@0,100;0,200;0,300;0,400;1,100;1,200;1,300;1,600&display=swap');
        body {
            font-family: 'Courgette', cursive;
        }
        p {
            font-family: 'Comforter' sans-serif, cursive;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Labore dolorum odit laborum eos delectus sed! Aliquam eligendi libero eius cupiditate, corrupti, asperiores cumque suscipit consequuntur doloremque, maiores ut qui blanditiis?</p>
</body>
</html>
