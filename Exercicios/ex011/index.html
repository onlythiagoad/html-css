<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens Dinâmicas</h1>

    <p>Tente abrir esse site em outros dispostivos ou diminua o tamanho de seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Escute o audio abaixo</p>
    <audio preload="metadata" controls loop>
        <source src="midia/neffex.mp3" type="audio/mpeg">
    </audio>
    <!--TOTAL COMPATIBILIDADE COM MP3 WAV OGG-->
    <p>Se seu navegador não conseguir reproduzir, clique <a href="midia/neffex.mp3">aqui</a> para baixar o audio em mp3.</p>
</body>
</html>
