<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr>
            <td>Maçã</td>
            <td>Melancia</td>
            <td>Goiaba</td>
            <td>Chocolate</td>
        </tr>
        <tr>
            <td>Uva</td>
            <td>Abacate</td>
            <td>Laranja</td>
            <td>Sorvete</td>
        </tr>
    </table>
</body>
</html>
