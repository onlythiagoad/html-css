<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1{ 
            background-color: purple;
            width: 300px;
            height: 300px;

           border: 10px solid blue;

           
           padding: 10px; 
           /*caso for do msm tamanho so usa uma vez o 10px*/
            text-align: center;

            margin: 20px auto 20px auto;

            outline:5px dashed cyan;
        }
        a {
            font-weight: bold;
        }
        a:active{
            color: black;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de caixas box-level mas <a href="#"> links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona.
    </p>
</body>
</html>
