<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média das Notas</title>
    <style>
        table {
            border-collapse: collapse;
        }
        caption {
            padding: 10px;
            font-size: 1.5em;
        }
        thead {
            background-color: gray;
            color: white;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        .media, td#media {
            background-color: gray;
            color: white;
            font-weight: bold;
        }
        .media {
            text-align: left;
        }
        .num {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <caption>
            Notas do Aluno
        </caption>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
             </tr>
             <tr>
                 <th scope="col">Nota 1</th>
                 <th scope="col">Nota 2</th>
             </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td class="num">4.3</td>
                <td class="num">8.4</td>
                <td class="num">6.3</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="num">7.0</td>
                <td class="num">8.4</td>
                <td class="num">7.7</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="num">7.0</td>
                <td class="num">9.0</td>
                <td class="num">11.5</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="num">8.0</td>
                <td class="num">7.5</td>
                <td class="num">11.7</td>
            </tr>
            <tr>
                <th colspan="4" class="media" scope="row">Média de Exatas</th>
                <td class="num" id="media">9.3</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td class="num">6.2</td>
                <td class="num">7.2</td>
                <td class="num">6.7</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td class="num">7.2</td>
                <td class="num">6.5</td>
                <td class="num">6.8</td>
            </tr>
            <tr>
                <th class="media" colspan="4" scope="row">Média de Humanas</th>
                <td class="num" id="media">6.7</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
